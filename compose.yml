# Full home-audio routing stack:
#   - mosquitto: MQTT broker for the N:N cross-host routing path.
#   - roon-hub:  MQTT-path Roon adapter (separate Extension ID from any
#                direct-connect edge-agent; both can run in parallel).
#   - weave-server: config + state hub. REST on /api/*, WS on /ws/edge and
#                /ws/ui. Published to host :3101 (3001 collides with Cognee
#                on the target machine).
#   - weave-web: Next.js UI. Port :3000 inside the container, :3100 on the
#                host. Proxies /api and /ws through Next.js rewrites to the
#                weave-server container.
#
# edge-agent is intentionally NOT in this stack — it needs host bluez/D-Bus
# access for BLE. Run it natively (systemd/user service) on the host that's
# physically near the Nuimo.
#
# Layout: this compose file is the single source of truth for the home stack.
# It assumes the sibling `roon-rs` repo is checked out alongside this one so
# roon-hub can be built from source:
#
#   ~/ManagedProjects/weave      ← this repo (compose.yml, weave-server, weave-web)
#   ~/ManagedProjects/roon-rs    ← sibling (roon-hub Dockerfile)
#
# Usage:
#   docker compose up -d
#   open http://localhost:3100           # weave-web
#   ws://localhost:3101/ws/edge          # point your edge-agent here
#   mqtt://localhost:1883                # mosquitto, for roon-hub
#
# First-time Roon pairing: after roon-hub starts, approve "roon-hub" in
# Roon → Settings → Extensions. The edge-agent registers as its own
# Extension (unique extension_id) and also needs approval once.
#
# Volume migration from the previous roon-rs/compose.yml location: see
# CLAUDE.md (the deploy topology section) for the one-time rename script.

name: weave

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: roon-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./deploy/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  roon-hub:
    build:
      context: ../roon-rs
      dockerfile: crates/roon-hub/Dockerfile
    container_name: roon-hub
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      ROON_HUB_MQTT_HOST: mosquitto
      ROON_HUB_MQTT_PORT: "1883"
      # Direct-connect to the Roon Core running on the docker host.
      # `host.docker.internal` resolves via the `extra_hosts` entry below
      # (needed on Linux; it's implicit on Docker Desktop). This is portable
      # across hosts whose LAN IPs change — swap for a literal IP only if
      # the Roon Core lives on a *different* machine than the docker host.
      # Uncomment `network_mode: host` below to use SOOD discovery instead
      # (UDP multicast).
      ROON_HUB_ROON_HOST: "host.docker.internal"
      ROON_HUB_ROON_PORT: "9330"
      RUST_LOG: "info"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/roon-hub/roon-hub.toml:/etc/roon-hub/roon-hub.toml:ro
      - roon-hub-data:/var/lib/roon-hub
    # network_mode: host

  weave-server:
    build:
      # weave-contracts is on crates.io, so the Rust build only needs this
      # repo as context.
      context: .
      dockerfile: crates/weave-server/Dockerfile
    container_name: weave-server
    restart: unless-stopped
    ports:
      - "3101:3001"
    environment:
      RUST_LOG: "info,sqlx=warn"
      # Keep MQTT disabled here — the broker is for the MQTT path only and
      # the server will otherwise spam reconnect warnings. Set to 0 if you
      # want weave-server to also consume MQTT.
      WEAVE_DISABLE_MQTT: "1"
    volumes:
      - weave-data:/var/lib/weave

  weave-web:
    build:
      context: ./weave-web
      dockerfile: Dockerfile
    container_name: weave-web
    restart: unless-stopped
    depends_on:
      - weave-server
    # Host port 3000 is often in use by other local dev services; publish to
    # 3100 and note the browser URL below.
    ports:
      - "3100:3000"
    environment:
      WEAVE_SERVER_UPSTREAM: "http://weave-server:3001"

volumes:
  mosquitto-data:
  mosquitto-log:
  roon-hub-data:
  weave-data:
