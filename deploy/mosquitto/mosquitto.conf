# Mosquitto broker config for the weave MQTT path.
# LAN-trusted deployment: anonymous auth on 1883. If exposing beyond the LAN,
# add listeners with password_file + ACLs.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
autosave_interval 60

log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
