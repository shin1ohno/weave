name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --tests -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: weave-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: weave-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  publish-dryrun:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p weave-engine --dry-run
      - run: cargo publish -p weave-server --dry-run
