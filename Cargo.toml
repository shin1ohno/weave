[workspace]
members = ["crates/*"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Shin'ichi Ohno <sh1@mercari.com>"]
repository = "https://github.com/shin1ohno/weave"
homepage = "https://github.com/shin1ohno/weave"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1", features = ["v4", "serde"] }

# Use the sibling edge-agent checkout's weave-contracts during local
# development of in-progress schema changes (target_candidates /
# target_switch_on). Remove this patch and bump the crates.io dep in
# weave-server/Cargo.toml once the extended weave-contracts is published.
[patch.crates-io]
weave-contracts = { path = "../edge-agent/crates/weave-contracts" }
